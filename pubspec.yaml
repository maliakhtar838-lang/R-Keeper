name: rkeeper
description: RKeeper - a visual offline-first progress companion for books, comics, manga, and shows.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  image_picker: ^1.1.2
  intl: ^0.20.2
  url_launcher: ^6.3.0
  uuid: ^4.5.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
